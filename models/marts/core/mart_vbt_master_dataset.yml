version: 2

models:
  - name: mart_vbt_master_dataset
    description: 最終回測主資料表

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date
              - ticker

    columns:
      - name: date
        tests:
          - not_null

      - name: ticker
        tests:
          - not_null